<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StressTest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #f97c2b;
    --pink: #d4607a;
    --purple: #7b5ea7;
    --teal: #7dd4d4;
    --dark: #0a0a0a;
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-blur: blur(24px);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    color: #fff;
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  /* — Grain overlay — */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-size: 180px 180px;
    opacity: 0.04;
    pointer-events: none;
  }

  /* — Gradient orbs — */
  .orb {
    position: fixed; border-radius: 50%;
    filter: blur(120px); pointer-events: none; z-index: 0;
    animation: drift 14s ease-in-out infinite alternate;
  }
  .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #f97c2b55, transparent 70%); top: -200px; left: -150px; animation-delay: 0s; }
  .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7dd4d444, transparent 70%); bottom: -150px; right: -100px; animation-delay: -5s; }
  .orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, #7b5ea755, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -9s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  /* — Layout — */
  .site {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    gap: 0;
  }

  /* — Card — */
  .card {
    padding: 56px 64px 52px;
    max-width: 820px;
    width: 100%;
    display: flex; flex-direction: column;
    align-items: center; gap: 44px;
    animation: cardIn 1s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* — Logo — */
  .logo-wrap {
    width: 100%;
    animation: fadeUp 0.9s 0.15s cubic-bezier(.16,1,.3,1) both;
  }
  .logo-wrap img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.4s ease;
  }
  .logo-wrap img:hover {
    transform: scale(1.015);
  }

  /* — Divider — */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
    animation: fadeUp 0.9s 0.3s cubic-bezier(.16,1,.3,1) both;
  }

  /* — Buttons — */
  .actions {
    display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.9s 0.45s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .btn {
    position: relative;
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 36px;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s ease;
    overflow: hidden;
    border: none;
    outline: none;
  }

  /* Ripple */
  .btn::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: rgba(255,255,255,0.15);
    transform: scale(0); opacity: 0;
    transition: transform 0.5s cubic-bezier(.16,1,.3,1), opacity 0.5s;
  }
  .btn:active::after { transform: scale(2.5); opacity: 0; transition: 0s; }

  .btn:hover { transform: translateY(-3px) scale(1.03); }
  .btn:active { transform: translateY(0) scale(0.98); }

  /* Email btn */
  .btn-email {
    background: linear-gradient(135deg, #f97c2b, #d4607a);
    color: #fff;
    box-shadow: 0 8px 32px rgba(249,124,43,0.35), 0 2px 8px rgba(0,0,0,0.3);
  }
  .btn-email:hover {
    box-shadow: 0 16px 48px rgba(249,124,43,0.55), 0 4px 16px rgba(0,0,0,0.4);
  }

  /* Instagram btn */
  .btn-instagram {
    background: var(--glass-bg);
    color: #fff;
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .btn-instagram:hover {
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    background: rgba(255,255,255,0.08);
  }

  /* Icons */
  .btn-icon {
    width: 20px; height: 20px;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .card { padding: 40px 28px 40px; }
    .actions { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="site">
  <div class="card">

    <div class="logo-wrap">
      <img src="/assets/stresstestlogo.png" alt="StressTest" draggable="false">
    </div>

    <div class="divider"></div>

    <div class="actions">
      <a href="#" id="emailBtn" class="btn btn-email">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="3"/>
          <path d="m2 7 10 7 10-7"/>
        </svg>
        <span id="emailText"></span>
      </a>

      <a href="https://instagram.com/art.stresstest" target="_blank" rel="noopener" class="btn btn-instagram">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        @art.stresstest
      </a>
    </div>

  </div>
</main>

<script>
  // Email assembled at runtime — never appears in HTML source
  (function() {
    var p = ['c','o','n','t','a','c','t'];
    var d = ['s','t','r','e','s','s','t','e','s','t','.','u','k'];
    var e = p.join('') + String.fromCharCode(64) + d.join('');
    var btn = document.getElementById('emailBtn');
    btn.href = 'mai' + 'lto:' + e;
    document.getElementById('emailText').textContent = e;
  })();

  // Button ripple feedback
  document.querySelectorAll('.btn').forEach(function(btn) {
    btn.addEventListener('mousedown', function(e) {
      var r = this.getBoundingClientRect();
      var x = e.clientX - r.left, y = e.clientY - r.top;
      var ripple = document.createElement('span');
      Object.assign(ripple.style, {
        position: 'absolute', borderRadius: '50%',
        width: '8px', height: '8px',
        left: x + 'px', top: y + 'px',
        transform: 'translate(-50%,-50%) scale(0)',
        background: 'rgba(255,255,255,0.3)',
        animation: 'rippleOut 0.6s cubic-bezier(.16,1,.3,1) forwards',
        pointerEvents: 'none'
      });
      this.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 700);
    });
  });
</script>

<style>
  @keyframes rippleOut {
    to { transform: translate(-50%,-50%) scale(30); opacity: 0; }
  }
</style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oops! — StressTest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #f97c2b;
    --pink: #d4607a;
    --dark: #0d0a12;
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --glass-blur: blur(24px);
  }

  html, body {
    width: 100%; height: 100%;
    background-color: var(--dark);
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 28px 28px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
  }

  .site {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px;
    gap: 32px;
    text-align: center;
  }

  .logo-wrap {
    animation: fadeUp 0.9s 0s cubic-bezier(.16,1,.3,1) both;
  }
  .logo-wrap img {
    height: 40px; width: auto; display: block;
    opacity: 0.85;
  }

  .oops-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.08em;
    line-height: 1;
    background: linear-gradient(135deg, #f97c2b, #d4607a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.9s 0.1s cubic-bezier(.16,1,.3,1) both;
  }

  .oops-body {
    font-size: 1.05rem;
    line-height: 1.7;
    color: rgba(255,255,255,0.55);
    max-width: 380px;
    animation: fadeUp 0.9s 0.2s cubic-bezier(.16,1,.3,1) both;
  }

  .btn-home {
    position: relative;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 15px 32px;
    border-radius: 100px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    background: var(--glass-bg);
    color: #fff;
    border: 1px solid var(--glass-border);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), background 0.2s, border-color 0.2s;
    animation: fadeUp 0.9s 0.3s cubic-bezier(.16,1,.3,1) both;
  }
  .btn-home:hover {
    transform: translateY(-2px) scale(1.03);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
  }
  .btn-home:active { transform: translateY(0) scale(0.98); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<main class="site">

  <div class="logo-wrap">
    <a href="/index.html">
      <img src="/assets/stresstestlogo.png" alt="StressTest">
    </a>
  </div>

  <div class="oops-heading">Oops!</div>

  <p class="oops-body">
    There's nothing here just yet. Check again soon!
  </p>

  <a href="/index.html" class="btn-home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back to Home
  </a>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kane Heath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0b14;
      --surface: #13101f;
      --purple: #7c3aed;
      --purple-light: #a78bfa;
      --purple-mid: #5b21b6;
      --text: #ede9fe;
      --muted: #6d6585;
      --border: #2a2240;
      --accent: #c4b5fd;
    }

    html { cursor: none; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 60vh;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 100;
      opacity: 0.45;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 7px;
      height: 7px;
      background: var(--purple-light);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s ease, height 0.2s ease;
    }

    .cursor-ring {
      position: fixed;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
    }

    .cursor.expand { width: 14px; height: 14px; }
    .cursor-ring.expand { width: 46px; height: 46px; border-color: rgba(167,139,250,0.6); }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 36px;
      height: 36px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }
    .corner svg { width: 100%; height: 100%; }
    .corner--tl { top: 24px; left: 24px; animation-delay: 0.9s; }
    .corner--tr { top: 24px; right: 24px; animation-delay: 1.1s; }
    .corner--bl { bottom: 24px; left: 24px; animation-delay: 1.3s; }
    .corner--br { bottom: 24px; right: 24px; animation-delay: 1.5s; }

    /* Main content */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    /* Name */
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: clamp(4.2rem, 13vw, 10rem);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--text);
      opacity: 0;
      animation: slideUp 1s ease forwards 0.3s;
      position: relative;
      display: inline-block;
    }

    h1 .first { display: block; }
    h1 .last {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--purple-light);
      transition: color 0.4s ease, -webkit-text-stroke 0.4s ease;
    }

    h1:hover .last {
      color: var(--purple-light);
      -webkit-text-stroke: 1.5px var(--purple-light);
    }

    /* Subheading */
    .subheading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 2.4vw, 1.45rem);
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 1.4rem;
      opacity: 0;
      animation: slideUp 0.8s ease forwards 0.6s;
    }

    /* Divider */
    .divider {
      width: 56px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 2.4rem auto;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.9s;
    }

    /* Buttons area */
    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      opacity: 0;
      animation: slideUp 0.8s ease forwards 1s;
      flex-wrap: wrap;
    }

    /* Email button */
    .btn-email {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.78rem 1.5rem;
      position: relative;
      transition: color 0.3s ease, border-color 0.3s ease;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-email::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--purple-mid);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: -1;
    }

    .btn-email:hover {
      color: var(--text);
      border-color: var(--purple-mid);
    }

    .btn-email:hover::before { transform: translateX(0); }

    .btn-email svg {
      width: 13px;
      height: 13px;
      transition: transform 0.3s ease;
    }

    .btn-email:hover svg { transform: rotate(-8deg) scale(1.1); }

    /* StressTest button */
    .btn-stress {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      background: var(--purple);
      padding: 0.78rem 1.5rem;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      overflow: hidden;
      transition: color 0.3s ease;
      border: 1px solid var(--purple);
    }

    .btn-stress::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--purple-light);
      transform: translateY(101%);
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 0;
    }

    .btn-stress:hover { color: var(--bg); }
    .btn-stress:hover::before { transform: translateY(0); }

    .btn-stress span, .btn-stress svg {
      position: relative;
      z-index: 1;
    }

    .btn-stress svg {
      width: 13px;
      height: 13px;
      transition: transform 0.3s ease;
    }

    .btn-stress:hover svg { transform: translate(3px, -3px); }

    /* Shimmer on StressTest */
    .btn-stress::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 50%;
      height: 200%;
      background: rgba(255,255,255,0.13);
      transform: skewX(-20deg);
      animation: shimmer 3.5s ease infinite 1.5s;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes shimmer {
      0%   { left: -80%; }
      100% { left: 160%; }
    }

    /* Footnotes */
    .footnote {
      position: fixed;
      bottom: 24px;
      right: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1.8s;
    }

    .year-mark {
      position: fixed;
      bottom: 24px;
      left: 28px;
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1.8s;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Tilt wrapper */
    .tilt-wrap {
      display: inline-block;
      transform-style: preserve-3d;
      transition: transform 0.18s ease;
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Corner marks -->
  <div class="corner corner--tl">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 20 L1 1 L20 1" stroke="#5b21b6" stroke-width="0.8" opacity="0.6"/>
    </svg>
  </div>
  <div class="corner corner--tr">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M39 20 L39 1 L20 1" stroke="#5b21b6" stroke-width="0.8" opacity="0.6"/>
    </svg>
  </div>
  <div class="corner corner--bl">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 20 L1 39 L20 39" stroke="#5b21b6" stroke-width="0.8" opacity="0.6"/>
    </svg>
  </div>
  <div class="corner corner--br">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M39 20 L39 39 L20 39" stroke="#5b21b6" stroke-width="0.8" opacity="0.6"/>
    </svg>
  </div>

  <!-- Main content -->
  <main class="container">
    <div class="tilt-wrap" id="tiltWrap">

      <h1 id="mainName">
        <span class="first">Kane</span>
        <span class="last">Heath</span>
      </h1>

      <p class="subheading">Aspiring Creative, Playwright.</p>

      <div class="divider"></div>

      <div class="buttons">
        <a href="mailto:me@kaneheath.co.uk" class="btn-email" id="emailBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          Get in touch
        </a>

        <a href="https://art.stresstest.uk" target="_blank" rel="noopener" class="btn-stress" id="stressBtn">
          <span>Visit StressTest!</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7,7 17,7 17,17"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

  <p class="footnote">Reading · England</p>
  <p class="year-mark">MMXXVI</p>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    function animateRing() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    const interactives = document.querySelectorAll('a, button, h1');
    interactives.forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.classList.add('expand'); ring.classList.add('expand'); });
      el.addEventListener('mouseleave', () => { cursor.classList.remove('expand'); ring.classList.remove('expand'); });
    });

    // Subtle 3D tilt
    const tilt = document.getElementById('tiltWrap');
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      tilt.style.transform = `perspective(900px) rotateY(${dx * 2.5}deg) rotateX(${-dy * 1.5}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      tilt.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';
    });


  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kane Heath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #1a1612;
      --paper: #f5f0e8;
      --cream: #ede6d6;
      --sepia: #8b7355;
      --rust: #c4622d;
      --light-sepia: #c9b99a;
      --muted: #9a8f82;
    }

    html {
      cursor: none;
    }

    body {
      background-color: var(--paper);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--rust);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
      mix-blend-mode: multiply;
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid var(--sepia);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.25s ease, height 0.25s ease, opacity 0.25s ease, border-color 0.25s ease;
      opacity: 0.6;
    }

    .cursor.expand { width: 16px; height: 16px; }
    .cursor-ring.expand { width: 52px; height: 52px; border-color: var(--rust); opacity: 0.4; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* Decorative ruled lines */
    .lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .lines::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: var(--light-sepia);
      opacity: 0.18;
      transform: translateX(-50%);
    }

    .lines::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: var(--light-sepia);
      opacity: 0.18;
      transform: translateY(-50%);
    }

    /* Corner marks */
    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    .corner svg { width: 100%; height: 100%; }
    .corner--tl { top: 28px; left: 28px; animation-delay: 0.8s; }
    .corner--tr { top: 28px; right: 28px; animation-delay: 1s; }
    .corner--bl { bottom: 28px; left: 28px; animation-delay: 1.2s; }
    .corner--br { bottom: 28px; right: 28px; animation-delay: 1.4s; }

    /* Decorative dots */
    .dot-grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.06;
      background-image: radial-gradient(circle, var(--sepia) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
    }

    /* Year / label */
    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: slideUp 0.8s ease forwards 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .label::before, .label::after {
      content: '';
      display: inline-block;
      width: 32px;
      height: 1px;
      background: var(--light-sepia);
    }

    /* Name */
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--ink);
      opacity: 0;
      animation: slideUp 1s ease forwards 0.4s;
      position: relative;
      display: inline-block;
    }

    h1 .first { display: block; }
    h1 .last {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--ink);
      transition: color 0.4s ease, -webkit-text-stroke 0.4s ease;
    }

    h1:hover .last {
      color: var(--rust);
      -webkit-text-stroke: 1.5px var(--rust);
    }

    /* Subheading */
    .subheading {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: var(--sepia);
      letter-spacing: 0.04em;
      margin-top: 1.4rem;
      opacity: 0;
      animation: slideUp 0.8s ease forwards 0.7s;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--light-sepia), transparent);
      margin: 2.4rem auto;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1s;
    }

    /* Buttons area */
    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      opacity: 0;
      animation: slideUp 0.8s ease forwards 1.1s;
      flex-wrap: wrap;
    }

    /* Email button */
    .btn-email {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sepia);
      text-decoration: none;
      border: 1px solid var(--light-sepia);
      padding: 0.75rem 1.5rem;
      position: relative;
      transition: color 0.3s ease, border-color 0.3s ease;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-email::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: translateX(-101%);
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: -1;
    }

    .btn-email:hover {
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-email:hover::before {
      transform: translateX(0);
    }

    .btn-email svg {
      width: 13px;
      height: 13px;
      transition: transform 0.3s ease;
    }

    .btn-email:hover svg {
      transform: rotate(-8deg) scale(1.1);
    }

    /* StressTest button */
    .btn-stress {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--paper);
      text-decoration: none;
      background: var(--rust);
      padding: 0.75rem 1.5rem;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      overflow: hidden;
      transition: color 0.3s ease;
      border: 1px solid var(--rust);
    }

    .btn-stress::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: translateY(101%);
      transition: transform 0.35s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: 0;
    }

    .btn-stress:hover::before {
      transform: translateY(0);
    }

    .btn-stress span, .btn-stress svg {
      position: relative;
      z-index: 1;
    }

    .btn-stress svg {
      width: 13px;
      height: 13px;
      transition: transform 0.3s ease;
    }

    .btn-stress:hover svg {
      transform: translate(3px, -3px);
    }

    /* Shimmer animation on stress button */
    .btn-stress::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -80%;
      width: 50%;
      height: 200%;
      background: rgba(255,255,255,0.12);
      transform: skewX(-20deg);
      animation: shimmer 3.5s ease infinite 1.5s;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { left: -80%; }
      100% { left: 160%; }
    }

    /* Small footnote */
    .footnote {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1.8s;
    }

    /* Floating year on left */
    .year-mark {
      position: fixed;
      bottom: 28px;
      left: 32px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 1.8s;
      writing-mode: horizontal-tb;
    }

    /* Keyframes */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Hover ripple on container */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      transform: scale(0);
      animation: rippleOut 0.7s ease forwards;
      border: 1px solid var(--light-sepia);
    }

    @keyframes rippleOut {
      to { transform: scale(1); opacity: 0; }
    }

    /* Tilt wrapper */
    .tilt-wrap {
      display: inline-block;
      transform-style: preserve-3d;
      transition: transform 0.15s ease;
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Background texture elements -->
  <div class="dot-grid"></div>
  <div class="lines"></div>

  <!-- Corner marks -->
  <div class="corner corner--tl">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 20 L1 1 L20 1" stroke="#8b7355" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner corner--tr">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M39 20 L39 1 L20 1" stroke="#8b7355" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner corner--bl">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 20 L1 39 L20 39" stroke="#8b7355" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>
  <div class="corner corner--br">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M39 20 L39 39 L20 39" stroke="#8b7355" stroke-width="0.8" opacity="0.5"/>
    </svg>
  </div>

  <!-- Main content -->
  <main class="container">
    <div class="tilt-wrap" id="tiltWrap">
      <p class="label">Portfolio</p>

      <h1 id="mainName">
        <span class="first">Kane</span>
        <span class="last">Heath</span>
      </h1>

      <p class="subheading">Aspiring Creative, Playwright.</p>

      <div class="divider"></div>

      <div class="buttons">
        <a href="mailto:me@kaneheath.co.uk" class="btn-email" id="emailBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="2,4 12,13 22,4"/>
          </svg>
          Get in touch
        </a>

        <a href="https://art.stresstest.uk" target="_blank" rel="noopener" class="btn-stress" id="stressBtn">
          <span>Visit StressTest!</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"/>
            <polyline points="7,7 17,7 17,17"/>
          </svg>
        </a>
      </div>
    </div>
  </main>

  <p class="footnote">Reading · England</p>
  <p class="year-mark">MMXXVI</p>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    // Ring lags slightly
    function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Cursor expand on interactive elements
    const interactives = document.querySelectorAll('a, button, h1');
    interactives.forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add('expand');
        ring.classList.add('expand');
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove('expand');
        ring.classList.remove('expand');
      });
    });

    // Ripple on click
    document.addEventListener('click', e => {
      if (e.target.closest('a')) return;
      const size = 80;
      const ripple = document.createElement('div');
      ripple.classList.add('ripple');
      ripple.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${e.clientX - size/2}px; top: ${e.clientY - size/2}px;
      `;
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 750);
    });

    // Subtle 3D tilt on name
    const tilt = document.getElementById('tiltWrap');
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      tilt.style.transform = `perspective(800px) rotateY(${dx * 3}deg) rotateX(${-dy * 2}deg)`;
    });

    document.addEventListener('mouseleave', () => {
      tilt.style.transform = 'perspective(800px) rotateY(0deg) rotateX(0deg)';
    });

    // Staggered letter animation on h1 hover
    const h1 = document.getElementById('mainName');
    h1.addEventListener('mouseenter', () => {
      h1.style.letterSpacing = '-0.01em';
    });
    h1.addEventListener('mouseleave', () => {
      h1.style.letterSpacing = '-0.02em';
    });

    // Magnetic effect on buttons
    function addMagnet(el, strength = 0.35) {
      el.addEventListener('mousemove', e => {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (e.clientX - cx) * strength;
        const dy = (e.clientY - cy) * strength;
        el.style.transform = `translate(${dx}px, ${dy}px)`;
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = '';
      });
    }

    addMagnet(document.getElementById('emailBtn'), 0.25);
    addMagnet(document.getElementById('stressBtn'), 0.25);
  </script>
</body>
</html>
